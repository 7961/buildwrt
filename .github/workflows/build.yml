name: Build openwrt for TP-Link WMA301-V2

on: workflow_dispatch

env:
  UPLOAD_ARTIFACT: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
   
jobs:
  build:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        df -h

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-pyelftools \
          python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          unzip upx-ucl vim wget xmlto xxd zlib1g-dev

    - name: Clone source code
      run: |
        git clone https://github.com/openwrt/openwrt.git openwrt
        cd openwrt
        git checkout v25.12.5
        git status
        
    - name: load custom files
      run: |
        mv -f target/linux/mediatek/dts/* openwrt/target/linux/mediatek/dts/
        mv -f target/linux/mediatek/filogic/base-files/etc/board.d/02_network openwrt/target/linux/mediatek/filogic/base-files/etc/board.d/
        mv -f target/linux/mediatek/filogic/base-files/etc/hotplug.d/ieee80211/11_fix_wifi_mac openwrt/target/linux/mediatek/filogic/base-files/etc//hotplug.d/ieee80211/
        sed -i '/tplink,tl-xtr8488/a\\ttplink,wma301*|\\' openwrt/target/linux/mediatek/filogic/base-files/lib/upgrade/platform.sh
        mv -f target/linux/mediatek/image/filogic.mk openwrt/target/linux/mediatek/image/

               
    - name: Load custom config
      run: |
        cp -f wma301.config openwrt/.config

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate config
      run: |
        cd openwrt
        make defconfig

    - name: Show build config
      run: |
        cat openwrt/.config

    - name: Download packages
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -delete

    - name: Compile firmware
      run: |
        cd openwrt
        echo "Compiling with $(nproc) threads..."
        make -j$(nproc)
        echo "Build completed!"
        find bin/targets/ -name "*.bin" -o -name "*.itb" | head -20

    - name: Organize output files
      id: organize
      run: |
        cd openwrt
        FIRMWARE_DIR="${GITHUB_WORKSPACE}/firmware"
        mkdir -p "$FIRMWARE_DIR"
        # Copy all firmware images
        find bin/targets/ -name "*.bin" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        find bin/targets/ -name "*.itb" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        find bin/targets/ -name "*.img.gz" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        find bin/targets/ -name "sha256sums" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        find bin/targets/ -name "config.buildinfo" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        find bin/targets/ -name "feeds.buildinfo" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        find bin/targets/ -name "version.buildinfo" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        # Also copy preloader and uboot if exists (for ubootmod variant)
        find bin/targets/ -name "preloader.bin" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        find bin/targets/ -name "bl31-uboot.fip" -exec cp {} "$FIRMWARE_DIR/" \; 2>/dev/null || true
        echo "=== Firmware files ==="
        ls -lh "$FIRMWARE_DIR/"
        echo "firmware_dir=$FIRMWARE_DIR" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      if: env.UPLOAD_ARTIFACT == 'true'
      with:
        name: WMA301-V2-firmware-${{ github.run_number }}
        path: firmware/
        retention-days: 30

    - name: Generate release info
      id: release_info
      run: |
        SOURCE_COMMIT=$(cd openwrt && git rev-parse --short HEAD)
        BUILD_DATE=$(date +"%Y%m%d")
        TAG_NAME="v${BUILD_DATE}-${SOURCE_COMMIT}"
        RELEASE_TITLE="WMA301-V2 ${BUILD_DATE} (${SOURCE_COMMIT})"
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
        echo "source_commit=$SOURCE_COMMIT" >> $GITHUB_OUTPUT

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      if: env.UPLOAD_RELEASE == 'true'
      with:
        tag_name: ${{ steps.release_info.outputs.tag_name }}
        name: ${{ steps.release_info.outputs.release_title }}
        body: |
          ## TP-Link WMA301-V2 OPENWRT 固件

          - **构建日期**: ${{ steps.release_info.outputs.release_title }}
          - **源码 Commit**: `${{ steps.release_info.outputs.source_commit }}`
          - **设备**: TP-Link WMA301-V2.0 (MT7981, filogic)
          - **Workflow Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        files: firmware/*
        draft: false
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
