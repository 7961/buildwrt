name: Build for ssh
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        df -h

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-pyelftools \
          python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          unzip upx-ucl vim wget xmlto xxd zlib1g-dev

    - name: Clone source code
      run: |
        git clone -b v25.12.5 --single-branch --depth=1 https://github.com/openwrt/openwrt.git
        cd openwrt
        git status
              
    - name: load custom files
      run: |
        mv -f target/linux/mediatek/dts/* openwrt/target/linux/mediatek/dts/
        mv -f target/linux/mediatek/filogic/base-files/etc/board.d/02_network openwrt/target/linux/mediatek/filogic/base-files/etc/board.d/
        mv -f target/linux/mediatek/filogic/base-files/etc/hotplug.d/ieee80211/11_fix_wifi_mac openwrt/target/linux/mediatek/filogic/base-files/etc//hotplug.d/ieee80211/
        sed -i '/tplink,tl-xtr8488/a\\ttplink,wma301|\\' openwrt/target/linux/mediatek/filogic/base-files/lib/upgrade/platform.sh
        sed -i '/tplink,tl-xtr8488/a\\ttplink,wma301|\\' openwrt/package/boot/uboot-tools/uboot-envtools/files/mediatek_filogic
        mv -f target/linux/mediatek/image/filogic.mk openwrt/target/linux/mediatek/image/
        mkdir -p openwrt/files/etc/uci-defaults
        mv -f 99-custom openwrt/files/etc/uci-defaults/
        cat openwrt/files/etc/uci-defaults/99-custom
        
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Start SSH service
      uses: mxschmitt/action-tmate@v3.24

    - name: show config(diff)
      run: |
        cd openwrt
        ./scripts/diffconfig.sh > wma301.config
        cat wma301.config
      
    - name: Upload config before build
      uses: actions/upload-artifact@v4
      with:
          name: config-before-build
          path: |
            openwrt/wma301.config

    - name: Compile firmware
      run: |
        cd openwrt
        make clean
        echo "Compiling with $(nproc) threads..."
        make -j$(nproc) || make -j1 V=s
        echo "Build completed!"

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: WMA301-V2-firmware
        path: openwrt/bin/targets/
        retention-days: 30        
        